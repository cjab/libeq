name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use_cross: false

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        shell: bash
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p s3d -p wld-cli
          else
            cargo build --release --target ${{ matrix.target }} -p s3d -p wld-cli
          fi

      - name: Package (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          for tool in s3d wld-cli; do
            archive="${tool}-${{ matrix.target }}.tar.gz"
            tar czf "${archive}" -C "target/${{ matrix.target }}/release" "${tool}"
            echo "Built ${archive}"
          done

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          for tool in s3d wld-cli; do
            archive="${tool}-${{ matrix.target }}.zip"
            7z a "${archive}" "./target/${{ matrix.target }}/release/${tool}.exe"
            echo "Built ${archive}"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: archives-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: archives-*
          merge-multiple: true
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
